<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>City care Hospitals - Admin Login</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
      overflow: hidden;
    }

    /* Stylish hospital title with shine effect */
    .title {
      font-size: 36px;
      font-weight: bold;
      color: #fff;
      text-align: center;
      margin-bottom: 30px;
      font-family: 'Trebuchet MS', sans-serif;
      letter-spacing: 2px;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.4);
      position: relative;
      display: inline-block;
      overflow: hidden;
    }

    .title::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.8), transparent);
      animation: shine 3s infinite;
    }

    @keyframes shine {
      0% { left: -100%; }
      50% { left: 100%; }
      100% { left: 100%; }
    }

    /* Login box */
    .login-container {
      background: #fff;
      padding: 40px 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.25);
      width: 330px;
      text-align: center;
      animation: fadeIn 1s ease-in-out;
    }

    .login-container h2 {
      margin-bottom: 20px;
      color: #1d4ed8;
      font-size: 24px;
      font-weight: bold;
    }

    .form-group {
      margin-bottom: 15px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 5px;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      outline: none;
      transition: border 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus {
      border-color: #1d4ed8;
      box-shadow: 0 0 8px rgba(29,78,216,0.4);
    }

    .btn {
      background: #1d4ed8;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 8px;
      width: 100%;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0a58ca;
      transform: scale(1.03);
    }

    .error {
      color: red;
      font-size: 14px;
      margin-top: 10px;
      display: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Notification panel */
    .notification {
      position: fixed;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      background: #16a34a;
      color: #fff;
      padding: 15px 35px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
      font-weight: bold;
      transition: top 0.6s ease-in-out;
      z-index: 1000;
    }

    .notification.show {
      top: 20px;
    }
  </style>
</head>
<body>
  <div class="title">CITY CARE HOSPITALS</div>

  <div class="login-container">
    <h2>Admin Login</h2>
    <form id="adminLoginForm">
      <div class="form-group">
        <label for="adminId">Admin ID</label>
        <input type="text" id="adminId" placeholder="Enter Admin ID" required>
      </div>
      <div class="form-group">
        <label for="adminPassword">Password</label>
        <input type="password" id="adminPassword" placeholder="Enter Password" required>
      </div>
      <button type="submit" class="btn">Login</button>
      <p class="error" id="errorMsg">Invalid Admin ID or Password</p>
    </form>
  </div>

  <!-- Notification Panel -->
  <div id="notification" class="notification">✅ Login Successful! Redirecting...</div>

  <script>
    document.getElementById("adminLoginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const adminId = document.getElementById("adminId").value;
      const adminPassword = document.getElementById("adminPassword").value;
      const errorMsg = document.getElementById("errorMsg");
      const notification = document.getElementById("notification");

      if (adminId === "ADMIN0001" && adminPassword === "@dmin0001") {
        errorMsg.style.display = "none";
        notification.classList.add("show");

        setTimeout(() => {
          notification.classList.remove("show");
          window.location.href = "dashboard.html"; // Redirect to dashboard
        }, 2000);
      } else {
        errorMsg.style.display = "block";
      }
    });
  </script>
</body>
</html>
