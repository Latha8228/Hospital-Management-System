<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bookings - City Care Hospital</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef2ff;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .container {
      max-width: 900px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 15px 40px rgba(37, 99, 235, 0.3);
      padding: 30px 40px;
    }

    h1 {
      color: #1e3a8a;
      text-align: center;
      margin-bottom: 15px;
      font-weight: 700;
      font-size: 2.2rem;
    }

    .count {
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 25px;
      color: #374151;
    }

    .booking-card {
      border-radius: 10px;
      padding: 16px 22px;
      margin-bottom: 18px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: inset 0 0 8px #e5e7eb;
    }

    .booking-info {
      max-width: 70%;
    }

    .booking-info h2 {
      margin: 0 0 6px 0;
      font-size: 1.15rem;
      color: #2563eb;
    }

    .booking-info p {
      margin: 3px 0;
      font-size: 0.95rem;
      color: #4b5563;
    }

    .booking-info p span {
      font-weight: 600;
      color: #111827;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn {
      background: #2563eb;
      border: none;
      color: white;
      padding: 7px 12px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .btn:hover {
      background: #1e40af;
    }

    .pending {
      border: 2px solid orange;
    }

    .approved {
      border: 2px solid green;
    }

    .no-bookings {
      text-align: center;
      font-size: 1.2rem;
      color: #6b7280;
      margin-top: 60px;
    }

    /* Modal */
    #opSheetModal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1100;
    }

    #opSheetModal.active {
      display: flex;
    }

    .op-sheet-modal-content {
      background: white;
      border-radius: 12px;
      max-width: 750px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      padding: 28px 32px;
      position: relative;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 20px;
      font-size: 26px;
      font-weight: bold;
      cursor: pointer;
      color: #444;
    }

    .op-sheet {
      border: 2px solid #111827;
      border-radius: 10px;
      padding: 18px;
      background: #fff;
    }

    .op-sheet .header {
      text-align: center;
      border-bottom: 2px solid #111827;
      padding-bottom: 8px;
      margin-bottom: 16px;
    }

    .op-sheet .header h1 {
      margin: 0;
      font-size: 1.4rem;
      color: #1e3a8a;
    }

    .op-sheet .header p {
      margin: 3px 0 0;
      font-style: italic;
      color: #555;
    }

    .op-sheet h2 {
      font-size: 1.1rem;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .op-sheet table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 10px;
    }

    .op-sheet td {
      padding: 5px 7px;
      border-bottom: 1px solid #eee;
    }

    .op-sheet td:first-child {
      font-weight: bold;
      width: 35%;
    }

    .footer {
      text-align: right;
      font-style: italic;
      margin-top: 12px;
      color: #444;
    }

    @media (max-width: 600px) {
      .booking-card {
        flex-direction: column;
        align-items: flex-start;
      }
      .booking-info {
        max-width: 100%;
        margin-bottom: 12px;
      }
      .actions {
        flex-direction: row;
        width: 100%;
        justify-content: space-between;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>My Appointments</h1>
    <p class="count" id="bookingCount"></p>
    <div id="bookingsList"></div>
  </div>

  <!-- Modal -->
  <div id="opSheetModal">
    <div class="op-sheet-modal-content">
      <span class="close-btn">&times;</span>
      <div class="op-sheet" id="opSheetContent"></div>
      <button class="btn" id="downloadImageBtn">Download as Image</button>
    </div>
  </div>

  <!-- html2canvas CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
  const bookingsList = document.getElementById("bookingsList");
  const bookingCount = document.getElementById("bookingCount");
  const modal = document.getElementById("opSheetModal");
  const closeBtn = modal.querySelector(".close-btn");
  const opSheetContent = document.getElementById("opSheetContent");
  const downloadImageBtn = document.getElementById("downloadImageBtn");

  let appointments = JSON.parse(localStorage.getItem("appointments")) || [];
  let currentUser = JSON.parse(localStorage.getItem("currentUser")) || null;

  // filter for current user
  if (currentUser) {
    appointments = appointments.filter(a => a.email === currentUser.email);
  }

  bookingCount.textContent = `You have ${appointments.length} appointment${appointments.length !== 1 ? 's' : ''}.`;

  if (appointments.length === 0) {
    bookingsList.innerHTML = '<p class="no-bookings">No appointments booked yet.</p>';
  } else {
    appointments.forEach((appt, index) => {
      const card = document.createElement("div");
      card.className = "booking-card " + (appt.doctor ? "approved" : "pending");
      card.innerHTML = `
        <div class="booking-info">
          <h2>Appointment #${index + 1}</h2>
          <p><span>Name:</span> ${appt.name}</p>
          <p><span>Date:</span> ${appt.date}</p>
          <p><span>Department:</span> ${appt.department}</p>
          <p><span>Slot:</span> ${appt.slot}</p>
          ${appt.doctor ? `<p style="color:green; font-weight:600;">Doctor Assigned: ${appt.doctor.name}</p>` 
                        : `<p style="color:orange; font-weight:600;">Pending Approval</p>`}
        </div>
        <div class="actions">
          <button class="btn view-btn" data-index="${index}">View OP Sheet</button>
        </div>
      `;
      bookingsList.appendChild(card);
    });
  }

  function showOpSheet(appt) {
    opSheetContent.innerHTML = `
      <div class="header">
        <h1>🏥 City Care Hospital</h1>
        <p>Outpatient Department - OP Sheet</p>
      </div>
      <h2>Patient Details</h2>
      <table>
        <tr><td>Name:</td><td>${appt.name}</td></tr>
        <tr><td>Gender:</td><td>${appt.gender}</td></tr>
        <tr><td>Age:</td><td>${appt.age}</td></tr>
        <tr><td>Phone:</td><td>${appt.phone}</td></tr>
        <tr><td>Email:</td><td>${appt.email}</td></tr>
        <tr><td>Address:</td><td>${appt.address}</td></tr>
      </table>
      <h2>Appointment Details</h2>
      <table>
        <tr><td>Problem:</td><td>${appt.problem}</td></tr>
        <tr><td>Department:</td><td>${appt.department}</td></tr>
        <tr><td>Ward:</td><td>${appt.ward}</td></tr>
        <tr><td>Date:</td><td>${appt.date}</td></tr>
        <tr><td>Slot:</td><td>${appt.slot}</td></tr>
      </table>
    `;

    if (appt.doctor) {
      opSheetContent.innerHTML += `
        <h2>Doctor Details</h2>
        <table>
          <tr><td>Doctor:</td><td>${appt.doctor.name}</td></tr>
<tr><td>Qualification:</td><td>${appt.doctor.qualification}</td></tr>
<tr><td>Specialization:</td><td>${appt.doctor.specialization}</td></tr>
        </table>
        <p style="margin-top:12px; font-weight:bold; color:green;">
          ${appt.doctor.name} has approved to check you on ${appt.date}.  
          Please be present by morning 9.
        </p>
      `;
    } else {
      opSheetContent.innerHTML += `
        <p style="margin-top:12px; font-weight:bold; color:orange;">
          Waiting for doctor approval.
        </p>
      `;
    }

    opSheetContent.innerHTML += `
      <div class="footer">Thank you for choosing City Care Hospital. Wishing you good health!</div>
    `;

    modal.classList.add("active");

    // enable download
    downloadImageBtn.onclick = () => {
      html2canvas(opSheetContent).then(canvas => {
        const link = document.createElement("a");
        link.download = `OP_Sheet_${appt.date}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    };
  }

  // Event delegation
  bookingsList.addEventListener("click", e => {
    if (e.target.classList.contains("view-btn")) {
      const index = e.target.dataset.index;
      showOpSheet(appointments[index]);
    }
  });

  closeBtn.addEventListener("click", () => modal.classList.remove("active"));
  modal.addEventListener("click", e => { if (e.target === modal) modal.classList.remove("active"); });
</script>
<button onclick="goBack()" 
        style="
          position: fixed;
          bottom: 20px;
          left: 50%;
          transform: translateX(-50%);
          background-color: #3b82f6; 
          color: white; 
          border: none; 
          padding: 10px 16px; 
          border-radius: 8px; 
          font-size: 16px; 
          cursor: pointer;
          display: flex;
          align-items: center;
          gap: 6px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        ">
  ← Back
</button>

<script>
  function goBack() {
    window.history.back();
  }
</script>
</body>
</html>
